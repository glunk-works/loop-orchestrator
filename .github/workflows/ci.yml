name: CI

on:
  pull_request:
    # `edited` is load-bearing: without it the default set is
    # [opened, synchronize, reopened], so a PR whose *title* fails `pr-title` can
    # never turn that check green by fixing the title — the check only re-runs on a
    # new commit, forcing a dummy push. `edited` fires on title/body edits, so the
    # title gate re-validates the thing it actually gates. The heavy jobs opt out of
    # it below (see `lint`) — editing prose must not re-run the suite.
    types: [opened, synchronize, reopened, edited]
  push:
    # Integration branches only. Sprint branches (`sprint/**`) are covered by their
    # PR, so listing them here would double every run for no extra signal. `feat/**`
    # is the backstop: it guarantees CI on anything that reaches an integration
    # branch even if a commit is pushed directly, bypassing the PR gate — the exact
    # gap that left sprints 26-31 with no CI at all.
    branches: [main, 'feat/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The merge is a squash, so the PR title becomes the commit subject on the
  # integration branch — it is the only message that survives, and so the only
  # one worth enforcing. WIP commits inside the branch stay free-form.
  pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate Conventional Commits title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(feat|fix|docs|test|refactor|perf|chore|ci|revert)(\([a-z0-9._/-]+\))?!?: [a-z].*[^.]$'
          if [[ ! "$TITLE" =~ $pattern ]]; then
            echo "::error::PR title is not a valid Conventional Commits subject: '$TITLE'"
            echo "Expected: type(scope): imperative subject   (lower-case, no trailing period)"
            echo "Types: feat|fix|docs|test|refactor|perf|chore|ci|revert   '!' marks a breaking change."
            exit 1
          fi
          if [[ ${#TITLE} -gt 72 ]]; then
            echo "::error::PR title is ${#TITLE} chars; the limit is 72."
            exit 1
          fi
          echo "OK: $TITLE"

  # Gate for the whole heavy chain. An `edited` event means the title/body changed,
  # not the tree — the code checks already ran on this exact SHA, so re-running them
  # would burn minutes for identical results. Skipping `lint` skips everything
  # downstream too (`format-check` → `test` → `secrets-scan`/`dependency-audit` →
  # `sbom` all reach it through `needs:`), so this one guard covers the chain.
  # On `push` events `github.event.action` is empty, so the condition holds there.
  lint:
    if: github.event.action != 'edited'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install hatch
      - run: hatch run ruff check .

  format-check:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install hatch
      - run: hatch run ruff format --check .

  test:
    runs-on: ubuntu-latest
    needs: format-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install hatch
      - run: hatch run test

  secrets-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_CONFIG: .gitleaks.toml

  dependency-audit:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install hatch
      - run: hatch run audit

  sbom:
    runs-on: ubuntu-latest
    needs: [secrets-scan, dependency-audit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install hatch
      - run: hatch run sbom
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
