name: CI

on:
  pull_request:
    # No `edited` here (BL-10 / sprint 33): this is the heavy code chain, and a
    # prose-only edit must never wake, cancel, or skip it. The title check that
    # *does* need `edited` lives in its own workflow, pr-title.yml, precisely so
    # the two concerns don't have to share a trigger list — or this concurrency
    # group (see below).
    types: [opened, synchronize, reopened]
  push:
    # Integration branches only. Sprint branches (`sprint/**`) are covered by their
    # PR, so listing them here would double every run for no extra signal. `feat/**`
    # is the backstop: it guarantees CI on anything that reaches an integration
    # branch even if a commit is pushed directly, bypassing the PR gate — the exact
    # gap that left sprints 26-31 with no CI at all.
    branches: [main, 'feat/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # `lint` (and everything chained after it via `needs:`) is unconditional by
  # design: no `if:` on any job in this file means no job can ever report
  # `skipped`, which is what closes BL-10 — a PR used to be able to reach an
  # all-green checks page having never run lint or the test suite, because a
  # gate keyed on `pr-title` would itself report `skipped` on the wrong event
  # and satisfy `needs:` without anything downstream having run. The PR title
  # check now lives in its own workflow, pr-title.yml, and gates nothing here;
  # a bad title costs runner minutes instead of stopping the chain, which is
  # the accepted trade (see sprint 33 / BL-10).
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install hatch
      - run: hatch run ruff check .

  format-check:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install hatch
      - run: hatch run ruff format --check .

  test:
    runs-on: ubuntu-latest
    needs: format-check
    # Read-only, and only what this job's new step needs beyond the repo
    # default: `pull-requests: read` for the `gh api .../files` call below.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install hatch
      - name: Determine whether this PR is docs-only
        id: docs_only
        # Only a `pull_request` event carries a PR number; `push` (main/feat/**)
        # has no docs-only concept and always runs the suite (this step's `if:`
        # is false, so `skip` stays unset -- the next step's own `if:` treats
        # unset as "run", never "skip").
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          # This job carries NO job-level `if:` (see
          # test_no_job_in_ci_workflow_can_report_skipped, BL-10/BL-12): it
          # always reports a `test` check-run. This step only decides whether
          # the NEXT step (the actual pytest run) is worth paying for -- a
          # docs-only PR cannot fail a suite it never touches. Fail SAFE: any
          # detection error or empty result runs pytest.
          #
          # NOT a pipeline into grep (the hitl-review.yml:70-74 lesson): grep
          # exits at its first match, closing the pipe, and a still-paginating
          # `gh` then dies of SIGPIPE (141), which `pipefail` would read as
          # this step's exit status. Capture into a variable first, match
          # second -- no pipe, no SIGPIPE, no size-dependent behavior.
          set -uo pipefail
          changed=$(gh api "repos/$REPO/pulls/$PR/files" --paginate --jq '.[].filename')
          status=$?
          if [ "$status" -ne 0 ] || [ -z "$changed" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Changed-file detection failed or was empty (exit=$status) -- running pytest (fail safe)."
            exit 0
          fi
          # Docs set: **/*.md, .ai/**, sprints/**, docs/** -- nothing else.
          # Skip ONLY if every changed file matches; run on anything else.
          if grep -vE '^\.ai/|^sprints/|^docs/|\.md$' <<<"$changed" > /dev/null; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Non-docs changes present -- running pytest."
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "All changed files are docs-only -- skipping pytest."
          fi
      - name: Run tests
        if: steps.docs_only.outputs.skip != 'true'
        # Sprint 37 Task 4: `test-parallel` (pytest-xdist, `-n auto
        # --dist=loadscope`) measured a repeatable ~1.7-1.8x wall-clock
        # speedup with no flake; `loadscope` keeps each test module on one
        # worker so the module-scoped MCP-provider fixtures (Task 2) aren't
        # redundantly re-spawned across workers.
        run: hatch run test-parallel

  secrets-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_CONFIG: .gitleaks.toml

  dependency-audit:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install hatch
      - run: hatch run audit

  sbom:
    runs-on: ubuntu-latest
    needs: [secrets-scan, dependency-audit]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install hatch
      - run: hatch run sbom
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom
          path: sbom.json
