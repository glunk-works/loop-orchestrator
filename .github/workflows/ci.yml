name: CI

on:
  pull_request:
    # No `edited` here (BL-10 / sprint 33): this is the heavy code chain, and a
    # prose-only edit must never wake, cancel, or skip it. The title check that
    # *does* need `edited` lives in its own workflow, pr-title.yml, precisely so
    # the two concerns don't have to share a trigger list — or this concurrency
    # group (see below).
    types: [opened, synchronize, reopened]
  push:
    # Integration branches only. Sprint branches (`sprint/**`) are covered by their
    # PR, so listing them here would double every run for no extra signal. `feat/**`
    # is the backstop: it guarantees CI on anything that reaches an integration
    # branch even if a commit is pushed directly, bypassing the PR gate — the exact
    # gap that left sprints 26-31 with no CI at all.
    branches: [main, 'feat/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # `lint` (and everything chained after it via `needs:`) is unconditional by
  # design: no `if:` on any job in this file means no job can ever report
  # `skipped`, which is what closes BL-10 — a PR used to be able to reach an
  # all-green checks page having never run lint or the test suite, because a
  # gate keyed on `pr-title` would itself report `skipped` on the wrong event
  # and satisfy `needs:` without anything downstream having run. The PR title
  # check now lives in its own workflow, pr-title.yml, and gates nothing here;
  # a bad title costs runner minutes instead of stopping the chain, which is
  # the accepted trade (see sprint 33 / BL-10).
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install hatch
      - run: hatch run ruff check .

  format-check:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install hatch
      - run: hatch run ruff format --check .

  test:
    runs-on: ubuntu-latest
    needs: format-check
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install hatch
      - run: hatch run test

  secrets-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_CONFIG: .gitleaks.toml

  dependency-audit:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install hatch
      - run: hatch run audit

  sbom:
    runs-on: ubuntu-latest
    needs: [secrets-scan, dependency-audit]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install hatch
      - run: hatch run sbom
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom
          path: sbom.json
